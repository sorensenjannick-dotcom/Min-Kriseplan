function dato(){return new Date().toLocaleDateString("da-DK",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});}

    fareBtn:{display:"block",textAlign:"center",padding:"12px",borderRadius:10,color:"#fff",textDecoration:"none",fontSize:"0.95rem",fontWeight:600},
    alarmPanel:{background:"#0f1a2a",border:"1px solid #1a3a5a",borderRadius:12,padding:"16px",display:"flex",flexDirection:"column",gap:10},
    alarmRad:{display:"flex",alignItems:"center",gap:12,background:"#12122a",borderRadius:10,padding:"12px"},
    alarmToggle:{width:26,height:26,borderRadius:6,border:"1.5px solid",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0},
    alarmInput:{background:"#0d0d22",border:"1px solid #2a2a4a",borderRadius:6,padding:"6px 10px",color:"#dcdcee",fontSize:"0.95rem",width:"100%",colorScheme:"dark"},
  };

  return(
    <div style={S.root}>

      {/* FARE MODAL */}
      {fareÅben&&(
        <div style={S.modalBg} className="modal-bg">
          <div style={{...S.modalCard,borderTop:"3px solid #E63946"}} className="modal-card">
            <div style={{textAlign:"center",padding:"8px 0 4px"}}>
              <p style={{fontSize:"2rem",marginBottom:8}}>🆘</p>
              <p style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.2rem",color:"#E63946",marginBottom:8}}>Vi er bekymrede for dig</p>
              <p style={{fontSize:"0.87rem",color:"#b0b0cc",lineHeight:1.65,marginBottom:16}}>
                Det du har skrevet tyder på at du har det meget svært og måske overvejer at gøre dig selv eller andre skade. Du fortjener hjælp – ring nu.
              </p>
            </div>
            <a href="tel:70201201" style={{...S.fareBtn,background:"#4895EF"}}>📞 Livslinjen – 70 201 201 – døgnet rundt</a>
            <a href="tel:80200808" style={{...S.fareBtn,background:"#E63946"}}>📞 StofTelefonen – 80 20 08 08</a>
            <a href="sms:1899" style={{...S.fareBtn,background:"#F4A261",color:"#1a1a2a"}}>💬 SMS-rådgivning – 1899</a>
            <a href="tel:1813" style={{...S.fareBtn,background:"#c1121f"}}>🏥 1813 – Lægevagt</a>
            <a href="tel:112" style={{...S.fareBtn,background:"#9B0000"}}>🚨 112 – Livstruende nødsituation</a>
            <p style={{fontSize:"0.75rem",color:"#5a5a8a",textAlign:"center",fontStyle:"italic"}}>Du er ikke alene. Det er okay at bede om hjælp.</p>
            <button style={{background:"none",border:"1px solid #2a2a4a",borderRadius:8,padding:"10px",color:"#6a6a9a",fontSize:"0.85rem",cursor:"pointer"}}
              onClick={()=>setFareÅben(false)}>Luk og fortsæt</button>
          </div>
        </div>
      )}

      {/* TJEK MODAL */}
      {tjekÅben&&(
        <div style={S.modalBg} className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setTjekÅben(false);}}>
          <div style={S.modalCard} className="modal-card">
            {!tjekGemt?<>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:"1.5rem",color:"#4895EF"}}>◌</span>
                <div style={{flex:1}}>
                  <p style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.2rem",color:"#f0f0ff"}}>Følelsestjek</p>
                  <p style={{fontSize:"0.78rem",color:"#6a6a9a"}}>Stop op – hvad mærker du lige nu?</p>
                </div>
                <button style={{background:"none",border:"none",color:"#5a5a7a",fontSize:"1.1rem",cursor:"pointer"}} onClick={()=>setTjekÅben(false)}>✕</button>
              </div>
              <p style={S.lbl}>Vælg din dominerende følelse</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                {GF.map(fv=>(
                  <button key={fv.id} style={{borderRadius:10,padding:"10px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:"pointer",
                    background:tjekF===fv.id?fv.farve+"30":"transparent",border:`1px solid ${tjekF===fv.id?fv.farve:"#2a2a4a"}`}}
                    onClick={()=>setTjekF(fv.id)}>
                    <span style={{fontSize:"1.4rem"}}>{fv.emoji}</span>
                    <span style={{fontSize:"0.73rem",color:tjekF===fv.id?fv.farve:"#7070a0"}}>{fv.navn}</span>
                  </button>
                ))}
              </div>
              {tjekF&&<div className="fade">
                <p style={{fontSize:"0.9rem",marginBottom:8,color:"#c0c0d8"}}>
                  Intensitet: <strong style={{color:GF.find(x=>x.id===tjekF)?.farve}}>{tjekInt}/10</strong>
                </p>
                <input type="range" min={1} max={10} value={tjekInt}
                  onChange={e=>setTjekInt(Number(e.target.value))}
                  style={{width:"100%",accentColor:GF.find(x=>x.id===tjekF)?.farve,cursor:"pointer",marginBottom:12}}/>
                <textarea style={{background:"#0d0d22",border:"1px solid #2a2a4a",borderRadius:8,padding:"10px",color:"#dcdcee",fontSize:"0.87rem",resize:"none",width:"100%"}}
                  rows={2} placeholder="Notér kort hvad der rør sig… (valgfrit)" value={tjekNote} onChange={e=>setTjekNote(e.target.value)}/>
                <button style={{background:"#9B5DE5",border:"none",borderRadius:10,padding:"12px",color:"#fff",fontSize:"0.92rem",cursor:"pointer",width:"100%",marginTop:4}}
                  onClick={gemTjek}>Gem tjek ✓</button>
              </div>}
              {!tjekF&&<p style={{fontSize:"0.78rem",color:"#4a4a6a",textAlign:"center"}}>Vælg en følelse for at fortsætte</p>}
            </>:(
              <div style={{textAlign:"center",padding:"32px 20px"}} className="bounce">
                <p style={{fontSize:"2.5rem",marginBottom:12}}>✓</p>
                <p style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.2rem",color:"#06D6A0"}}>Gemt i dagbogen!</p>
                <p style={{fontSize:"0.85rem",color:"#6a6a9a",marginTop:6}}>Du stoppede op og mærkede dig selv.</p>
              </div>
            )}
          </div>
        </div>
      )}

      {/* HEADER */}
      <header style={S.hdr}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:6}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:"#9B5DE5"}}/>
          <span style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.6rem",color:"#f0f0ff",letterSpacing:"0.02em"}}>Min Kriseplan</span>
        </div>
        <p style={{fontSize:"0.76rem",color:"#5a5a8a",letterSpacing:"0.06em"}}>Kognitiv tilgang til rusmiddelproblematik</p>
      </header>

      {/* NAV */}
      <nav style={S.nav}>
        {[{id:"home",l:"Hjem",s:"⬡"},{id:"kriseplan",l:"Kriseplan",s:"🛡"},{id:"følelser",l:"Følelser",s:"◌"},{id:"kognitiv",l:"Analyser",s:"⟳"},{id:"dagbog",l:"Dagbog",s:"📖"},{id:"støtte",l:"Støtte",s:"◈"}].map(n=>(
          <button key={n.id} style={{...S.nb,...(view===n.id?S.no:{})}} onClick={()=>setView(n.id)}>
            <span style={{fontSize:"0.9rem"}}>{n.s}</span><span>{n.l}</span>
          </button>
        ))}
      </nav>

      <main style={S.main} className="sin" key={view}>

        {/* HJEM */}
        {view==="home"&&<div style={S.col}>
          <div style={{background:"linear-gradient(135deg,#0f1a2a,#0a1828)",border:"1px solid #1a3a5a",borderRadius:14,padding:"16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:"1.4rem",color:"#4895EF"}}>◌</span>
              <div>
                <p style={{fontSize:"0.95rem",fontWeight:500,color:"#c0d8f0",marginBottom:2}}>Følelsestjek</p>
                <p style={{fontSize:"0.75rem",color:aktAlarmer>0?"#4895EF":"#5a7a9a"}}>
                  {aktAlarmer>0?`🔔 ${aktAlarmer} påmindelse${aktAlarmer>1?"r":""} aktiv`:"Stop op og mærk dig selv"}
                </p>
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button style={{border:"none",borderRadius:8,padding:"9px 11px",color:"#fff",fontSize:"1.1rem",cursor:"pointer",background:"#1a1a40"}} onClick={()=>setVisAlarm(v=>!v)} title="Påmindelser">🔔</button>
              <button style={{border:"none",borderRadius:8,padding:"9px 14px",color:"#fff",fontSize:"0.82rem",cursor:"pointer",background:"#9B5DE5"}} onClick={åbnTjek}>Start tjek</button>
            </div>
          </div>

          {visAlarm&&(
            <div style={S.alarmPanel} className="fade">
              <p style={{...S.lbl,marginBottom:4}}>🔔 Daglige påmindelser</p>
              <p style={{fontSize:"0.78rem",color:"#5a5a8a",marginBottom:8}}>Vælg 0–2 tidspunkter for dit daglige følelsestjek</p>
              {alarmer.map((a,i)=>(
                <div key={a.id} style={S.alarmRad}>
                  <button style={{...S.alarmToggle,background:a.aktiv?"#9B5DE5":"transparent",borderColor:a.aktiv?"#9B5DE5":"#3a3a5a"}} onClick={()=>togAlarm(i)}>
                    {a.aktiv&&<span style={{color:"#fff",fontSize:"0.8rem"}}>✓</span>}
                  </button>
                  <div style={{flex:1}}>
                    <p style={{fontSize:"0.82rem",color:a.aktiv?"#c0c0e0":"#5a5a8a",marginBottom:4}}>Påmindelse {i+1}</p>
                    <input type="time" value={a.tid} disabled={!a.aktiv} onChange={e=>updAlarmTid(i,e.target.value)} style={{...S.alarmInput,opacity:a.aktiv?1:0.4}}/>
                  </div>
                  {a.aktiv&&<button style={{border:"none",borderRadius:8,padding:"8px 12px",color:"#fff",fontSize:"0.78rem",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,background:a.sat?"#2DC653":"#9B5DE5"}} onClick={()=>sætAlarm(i)}>{a.sat?"✓ Sat":"Sæt alarm"}</button>}
                </div>
              ))}
              <p style={{fontSize:"0.72rem",color:"#4a4a6a",fontStyle:"italic"}}>Alarmen sættes i din telefons urapp og minder dig om et følelsestjek.</p>
            </div>
          )}

          <div style={S.heroCard}>
            <p style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.25rem",color:"#f0f0ff",marginBottom:8}}>Har du det svært lige nu?</p>
            <p style={{fontSize:"0.86rem",color:"#8888aa",lineHeight:1.65,marginBottom:16}}>Start med at navngive følelsen – eller gå direkte til din kriseplan.</p>
            <div style={{display:"flex",gap:10}}>
              <button style={{flex:1,border:"none",borderRadius:10,padding:"12px 16px",color:"#fff",fontSize:"0.88rem",cursor:"pointer",background:"#9B5DE5"}} onClick={()=>setView("følelser")}>Navngiv følelse</button>
              <button style={{flex:1,border:"none",borderRadius:10,padding:"12px 16px",color:"#fff",fontSize:"0.88rem",cursor:"pointer",background:"#E63946"}} onClick={()=>setView("kriseplan")}>Kriseplan →</button>
            </div>
          </div>

          <p style={S.lbl}>Hvad er kognitiv tilgang?</p>
          <div style={S.infoBox}>
            <p style={{fontSize:"0.87rem",color:"#8888aa",lineHeight:1.7}}>Kognitive metoder bygger på idéen om at <span style={{color:"#9B5DE5",fontWeight:500}}>tanker → følelser → krop → adfærd</span> hænger uløseligt sammen og påvirker hinanden. Når vi genkender automatiske tanker, kan vi udfordre dem – og vælge en anden vej.</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:12,alignItems:"center"}}>
              {["Situation","→","Tanke","→","Følelse","→","Krop","→","Adfærd"].map((t,i)=>(
                <span key={i} style={t==="→"?{color:"#3a3a6a",fontSize:"0.8rem"}:{background:"#1e1e40",borderRadius:20,padding:"4px 10px",fontSize:"0.74rem",color:"#8080b8"}}>{t}</span>
              ))}
            </div>
          </div>

          <p style={S.lbl}>Dine værktøjer</p>
          <div style={S.grid2}>
            {[
              {l:"Min kriseplan",sub:"Din personlige plan",s:"🛡",c:"#E63946",t:"kriseplan"},
              {l:"6 grundfølelser",sub:"Navngiv hvad du mærker",s:"◌",c:"#9B5DE5",t:"følelser"},
              {l:"Analyser tanken",sub:"7-trins kognitiv analyse",s:"⟳",c:"#4895EF",t:"kognitiv"},
              {l:"Dagbog",sub:"Dine tidligere registreringer",s:"📖",c:"#F4A261",t:"dagbog"},
            ].map(c=>(
              <button key={c.l} style={{...S.toolCard,borderTop:`3px solid ${c.c}`}} onClick={()=>setView(c.t)}>
                <span style={{fontSize:"1.3rem",color:c.c}}>{c.s}</span>
                <span style={{fontSize:"0.87rem",fontWeight:500}}>{c.l}</span>
                <span style={{fontSize:"0.71rem",color:"#5a5a8a"}}>{c.sub}</span>
              </button>
            ))}
          </div>
        </div>}

        {/* KRISEPLAN */}
        {view==="kriseplan"&&<div style={S.col}>
          <div><p style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.4rem",color:"#f0f0ff",marginBottom:6}}>Min Kriseplan</p><p style={{fontSize:"0.84rem",color:"#6a6a9a",fontStyle:"italic"}}>Din personlige plan – gemmes automatisk</p></div>

          {/* Hvad er vigtigt */}
          <div style={S.planSek}>
            <div style={{...S.planHdr,borderLeft:"4px solid #06D6A0"}}>
              <span style={{fontSize:"1.3rem"}}>💚</span>
              <div><p style={{fontSize:"1rem",fontWeight:600,color:"#06D6A0",marginBottom:2}}>Hvad er vigtigt for dig?</p><p style={{fontSize:"0.75rem",color:"#6a6a9a"}}>Din motivation og dit udgangspunkt</p></div>
            </div>
            <div style={S.planBody}>
              <p style={S.planHjælp}>Svar gerne på det der giver mening for dig. Det du skriver her kan minde dig om hvorfor du kæmper – også når det er svært.</p>
              {["Hvad prøver du at passe på i dit liv lige nu?","Hvad håber du bliver anderledes?","Hvad betyder mest for dig – og hvad risikerer du at miste?","Hvad er din vigtigste grund til at reducere eller stoppe dit forbrug?"].map((q,i)=>(
                <p key={i} style={{fontSize:"0.78rem",color:"#5a5a8a",fontStyle:"italic",paddingLeft:8,borderLeft:"2px solid #06D6A050"}}>– {q}</p>
              ))}
              <textarea style={{...S.planTA,borderColor:"#06D6A050"}} rows={5}
                placeholder="Skriv med dine egne ord – der er ingen rigtige eller forkerte svar…"
                value={vigtigt} onChange={e=>setVigtigt(e.target.value)}/>
              {vigtigt&&<div style={{background:"#0d1f18",borderRadius:10,padding:"14px",border:"1px solid #1a3a28"}}>
                <p style={{fontSize:"0.7rem",color:"#06D6A0",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Det du har skrevet</p>
                <p style={{fontSize:"0.9rem",color:"#90d8b8",lineHeight:1.65,fontStyle:"italic"}}>"{vigtigt}"</p>
              </div>}
            </div>
          </div>

          {/* Advarselstegn */}
          <div style={S.planSek}>
            <div style={{...S.planHdr,borderLeft:"4px solid #F4A261"}}>
              <span style={{fontSize:"1.3rem"}}>⚠️</span>
              <div><p style={{fontSize:"1rem",fontWeight:600,color:"#F4A261",marginBottom:2}}>Mine advarselstegn</p><p style={{fontSize:"0.75rem",color:"#6a6a9a"}}>Tidlige signaler på at jeg har det svært</p></div>
            </div>
            <div style={S.planBody}>
              <p style={S.planHjælp}>Advarselstegn er de tidlige signaler du lægger mærke til, inden krisen er fuld udviklet.</p>
              {adv.map((a,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{color:"#F4A261",flexShrink:0}}>◆</span>
                  <input style={S.planInput} value={a}
                    placeholder={["Fx: Jeg isolerer mig og svarer ikke på beskeder","Fx: Jeg sover dårligt eller meget for meget","Fx: Jeg begynder at romantisere brugen","Fx: Skriv dit eget advarselstegn…"][i]||"Fx: Skriv dit eget advarselstegn…"}
                    onChange={e=>updAdv(i,e.target.value)}/>
                </div>
              ))}
              <button style={S.addBtn} onClick={()=>setAdv(p=>[...p,""])}>+ Tilføj advarselstegn</button>
            </div>
          </div>

          {/* Personlig aftale */}
          <div style={S.planSek}>
            <div style={{...S.planHdr,borderLeft:"4px solid #9B5DE5"}}>
              <span style={{fontSize:"1.3rem"}}>📝</span>
              <div><p style={{fontSize:"1rem",fontWeight:600,color:"#9B5DE5",marginBottom:2}}>Min personlige aftale</p><p style={{fontSize:"0.75rem",color:"#6a6a9a"}}>En aftale med mig selv</p></div>
            </div>
            <div style={S.planBody}>
              <p style={S.planHjælp}>Skriv en kort aftale med dig selv – hvad forpligter du dig til, når det bliver svært?</p>
              <textarea style={{...S.planTA,borderColor:"#9B5DE5"+"50"}} rows={4}
                placeholder={"Fx: Jeg lover mig selv, at når jeg mærker advarselstegnene, vil jeg…\n\nJeg fortjener et liv uden rusmidler, fordi…"}
                value={aftale} onChange={e=>setAftale(e.target.value)}/>
              {aftale&&<div style={{background:"#1a102a",borderRadius:10,padding:"14px",border:"1px solid #3a2060"}}>
                <p style={{fontSize:"0.7rem",color:"#9B5DE5",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Din aftale</p>
                <p style={{fontSize:"0.9rem",color:"#c0b0e0",lineHeight:1.65,fontStyle:"italic"}}>"{aftale}"</p>
              </div>}
            </div>
          </div>

          {/* Hvad hjælper faktisk */}
          <div style={S.planSek}>
            <div style={{...S.planHdr,borderLeft:"4px solid #4895EF"}}>
              <span style={{fontSize:"1.3rem"}}>🧰</span>
              <div><p style={{fontSize:"1rem",fontWeight:600,color:"#4895EF",marginBottom:2}}>Hvad hjælper faktisk?</p><p style={{fontSize:"0.75rem",color:"#6a6a9a"}}>Dine egne strategier der virker</p></div>
            </div>
            <div style={S.planBody}>
              <p style={S.planHjælp}>Det du skriver her er din personlige værktøjskasse. Kom tilbage til den når det er svært.</p>
              {["Hvad hjælper dig med at falde ned når du har det svært?","Hvad hjælper mod cravings – hvad har virket for dig tidligere?","Hvad giver dig ro i kroppen og i hovedet?","Hvem eller hvad kan du søge hen imod i stedet?"].map((q,i)=>(
                <p key={i} style={{fontSize:"0.78rem",color:"#5a5a8a",fontStyle:"italic",paddingLeft:8,borderLeft:"2px solid #4895EF50"}}>– {q}</p>
              ))}
              <textarea style={{...S.planTA,borderColor:"#4895EF50"}} rows={5}
                placeholder="Skriv det der rent faktisk virker for dig – store og små ting…"
                value={hvadHjælper} onChange={e=>setHvadHjælper(e.target.value)}/>
              {hvadHjælper&&<div style={{background:"#0d1428",borderRadius:10,padding:"14px",border:"1px solid #1a2a4a"}}>
                <p style={{fontSize:"0.7rem",color:"#4895EF",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Det du har skrevet</p>
                <p style={{fontSize:"0.9rem",color:"#90b8e0",lineHeight:1.65,fontStyle:"italic"}}>"{hvadHjælper}"</p>
              </div>}
            </div>
          </div>

          {/* 5-trins */}
          <div style={S.planSek}>
            <div style={{...S.planHdr,borderLeft:"4px solid #E63946"}}>
              <span style={{fontSize:"1.3rem"}}>🚨</span>
              <div><p style={{fontSize:"1rem",fontWeight:600,color:"#E63946",marginBottom:2}}>5-trins kriseplan</p><p style={{fontSize:"0.75rem",color:"#6a6a9a"}}>Hvad gør jeg, når krisen rammer?</p></div>
            </div>
            <div style={{...S.planBody,gap:8}}>
              <p style={S.planHjælp}>Følg trinnene i orden. Sæt flueben efterhånden som du gennemfører dem.</p>
              {K5.map(trin=>(
                <div key={trin.id}>
                  <button style={{...S.ktHdr,borderLeft:`4px solid ${trin.farve}`,background:kriseStatus[trin.id]?trin.farve+"18":"#141430"}}
                    onClick={()=>setAktKrise(aktKrise===trin.id?null:trin.id)}>
                    <div style={{display:"flex",alignItems:"center",gap:10,flex:1,textAlign:"left"}}>
                      <button style={{...S.ktBox,background:kriseStatus[trin.id]?trin.farve:"transparent",borderColor:trin.farve}}
                        onClick={e=>{e.stopPropagation();togKrise(trin.id);}}>
                        {kriseStatus[trin.id]&&<span style={{color:"#fff",fontSize:"0.8rem"}}>✓</span>}
                      </button>
                      <span style={{fontSize:"1rem",fontWeight:700,color:trin.farve}}>{trin.nr}</span>
                      <p style={{fontSize:"0.95rem",fontWeight:500,color:kriseStatus[trin.id]?"#7070a0":"#e0e0f0"}}>{trin.emoji} {trin.titel}</p>
                    </div>
                    <span style={{color:"#3a3a6a"}}>{aktKrise===trin.id?"▲":"▼"}</span>
                  </button>
                  {aktKrise===trin.id&&(
                    <div style={{...S.ktBody,borderLeft:`4px solid ${trin.farve}`}} className="fade">
                      <p style={{fontSize:"0.87rem",color:"#9090b0",lineHeight:1.65}}>{trin.beskrivelse}</p>
                      <div style={{paddingLeft:12,marginLeft:4,borderLeft:`2px solid ${trin.farve}`}}>
                        <p style={{fontSize:"0.85rem",color:"#b0b0cc",lineHeight:1.6}}>{trin.handling}</p>
                      </div>
                    </div>
                  )}
                </div>
              ))}
              {kriseDone>0&&(
                <div style={S.progBar}>
                  <div style={{...S.progFill,width:`${(kriseDone/5)*100}%`}}/>
                  <p style={{fontSize:"0.75rem",color:"#c0c0d8",position:"relative",zIndex:1,paddingLeft:12}}>{kriseDone}/5 trin gennemført</p>
                </div>
              )}
              <button style={{background:"none",border:"none",color:"#4a4a6a",fontSize:"0.75rem",cursor:"pointer",textDecoration:"underline",alignSelf:"flex-end"}} onClick={()=>setKriseStatus({})}>Nulstil flueben</button>
            </div>
          </div>
        </div>}

        {/* FØLELSER */}
        {view==="følelser"&&<div style={S.col}>
          {!valgtF?<>
            <div><p style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.4rem",color:"#f0f0ff",marginBottom:6}}>De 6 grundfølelser</p><p style={{fontSize:"0.84rem",color:"#6a6a9a",fontStyle:"italic"}}>Hvad er den dominerende følelse? Vælg én for at uddybe.</p></div>
            <div style={S.følGrid}>
              {GF.map(fv=>(
                <button key={fv.id} style={{...S.følKort,borderColor:fv.farve}} onClick={()=>{setValgtF(fv.id);setValgtN(null);}}>
                  <span style={{fontSize:"2rem"}}>{fv.emoji}</span>
                  <span style={{fontSize:"1rem",fontWeight:600,color:fv.farve}}>{fv.navn}</span>
                  <span style={{fontSize:"0.71rem",color:"#5a5a8a",textAlign:"center"}}>{fv.beskrivelse}</span>
                </button>
              ))}
            </div>
          </>:<div style={S.col} className="fade">
            <button style={S.backBtn} onClick={()=>{setValgtF(null);setValgtN(null);}}>← Tilbage</button>
            <div style={{borderRadius:12,padding:"18px 16px",background:f.farve+"15",borderLeft:`4px solid ${f.farve}`}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                <span style={{fontSize:"2.2rem"}}>{f.emoji}</span>
                <span style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.6rem",color:f.farve}}>{f.navn}</span>
              </div>
              <p style={{fontSize:"0.86rem",color:"#9090b0",lineHeight:1.65}}>{f.kognitivt}</p>
            </div>
            <p style={S.lbl}>Uddyb – vælg en nuance</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {f.nuancer.map(n=>(
                <button key={n} style={{border:"1px solid",borderRadius:20,padding:"7px 14px",fontSize:"0.84rem",cursor:"pointer",
                  background:valgtN===n?f.farve:"transparent",borderColor:f.farve,color:valgtN===n?"#fff":f.farve}}
                  onClick={()=>setValgtN(n)}>{n}</button>
              ))}
            </div>
            <div>
              <p style={{fontSize:"0.9rem",marginBottom:8,color:"#c0c0d8"}}>Intensitet: <strong style={{color:f.farve}}>{int}/10</strong></p>
              <input type="range" min={1} max={10} value={int} onChange={e=>setInt(Number(e.target.value))} style={{width:"100%",accentColor:f.farve,cursor:"pointer"}}/>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.7rem",color:"#5a5a8a",marginTop:4}}><span>Svag</span><span>Overvældende</span></div>
            </div>
            <p style={S.lbl}>Typiske automatiske tanker</p>
            <div style={{background:"#12122a",border:"1px solid #1e1e40",borderRadius:12,padding:"14px 16px",display:"flex",flexDirection:"column",gap:9}}>
              {f.tanker.map((t,i)=>(
                <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",fontSize:"0.87rem"}}>
                  <span style={{color:f.farve,fontSize:"1.1rem"}}>「</span>
                  <span style={{color:"#b0b0cc",fontStyle:"italic",lineHeight:1.5}}>{t}</span>
                  <span style={{color:f.farve,fontSize:"1.1rem"}}>」</span>
                </div>
              ))}
            </div>
            <p style={S.lbl}>Strategier</p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {f.strategier.map((str,i)=>(
                <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",background:"#12122a",borderRadius:10,padding:"12px 14px"}}>
                  <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:"0.8rem",fontWeight:600,flexShrink:0,background:f.farve}}>{i+1}</div>
                  <p style={{fontSize:"0.87rem",color:"#b0b0cc",lineHeight:1.55}}>{str}</p>
                </div>
              ))}
            </div>
            <button style={{...S.primaryBtn,background:f.farve}} onClick={()=>setView("kognitiv")}>Analyser tanken bag følelsen →</button>
          </div>}
        </div>}

        {/* KOGNITIV */}
        {view==="kognitiv"&&<div style={S.col}>
          <div><p style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.4rem",color:"#f0f0ff",marginBottom:6}}>Kognitiv analyse</p><p style={{fontSize:"0.84rem",color:"#6a6a9a",fontStyle:"italic"}}>Arbejd dig igennem situationen trin for trin</p></div>
          <div style={S.infoBox}>
            <p style={{fontSize:"0.87rem",color:"#8888aa",lineHeight:1.7}}>Tanker er ikke fakta. Denne øvelse hjælper dig med at se situationen fra en ny vinkel. <span style={{color:"#5a5a8a"}}>Analysen gemmes i dagbogen når du trykker "Gem".</span></p>
          </div>
          {KT.map((trin,idx)=>(
            <div key={trin.id}>
              <button style={{...S.trinHdr,borderLeft:`4px solid ${trin.farve}`,background:aktTrin===trin.id?"#141430":"#11112a"}}
                onClick={()=>setAktTrin(aktTrin===trin.id?null:trin.id)}>
                <div style={{display:"flex",alignItems:"flex-start",gap:12,flex:1,textAlign:"left"}}>
                  <span style={{color:trin.farve,fontSize:"1.2rem",fontWeight:700,lineHeight:1.3,flexShrink:0}}>{trin.ikon}</span>
                  <div>
                    <p style={{fontSize:"0.95rem",fontWeight:500,color:"#e0e0f0",marginBottom:2}}>{trin.titel}</p>
                    <p style={{fontSize:"0.77rem",color:"#6a6a9a",fontStyle:"italic"}}>{trin.spørgsmål}</p>
                  </div>
                </div>
                <span style={{color:kog[trin.id]?"#2DC653":"#3a3a5a",fontSize:"1rem",flexShrink:0}}>
                  {kog[trin.id]?"✓":(aktTrin===trin.id?"▲":"▼")}
                </span>
              </button>
              {aktTrin===trin.id&&(
                <div style={{...S.trinBody,borderLeft:`4px solid ${trin.farve}`}} className="fade">
                  <p style={{fontSize:"0.82rem",color:"#6a6a9a",lineHeight:1.6,fontStyle:"italic"}}>{trin.hjælp}</p>
                  <div style={{...S.sammBox,borderColor:trin.farve+"40",background:trin.farve+"0d"}}>
                    <span style={{fontSize:"0.68rem",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:600,color:trin.farve}}>↻ Sammenhæng</span>
                    <p style={{fontSize:"0.83rem",color:"#b0b0cc",lineHeight:1.6}}>{trin.sammenhæng}</p>
                  </div>
                  <textarea style={{...S.ta,borderColor:trin.farve+"50"}} rows={3}
                    placeholder={trin.placeholder} value={kog[trin.id]||""} onChange={e=>updKog(trin.id,e.target.value)}/>
                  {idx<KT.length-1&&(
                    <button style={{background:"none",border:`1px solid ${trin.farve}`,borderRadius:8,padding:"8px 16px",fontSize:"0.81rem",cursor:"pointer",alignSelf:"flex-end",color:trin.farve}}
                      onClick={()=>setAktTrin(KT[idx+1].id)}>Næste trin →</button>
                  )}
                </div>
              )}
            </div>
          ))}
          {Object.keys(kog).length>=2&&(
            <div style={S.opsumBox} className="fade">
              <p style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.1rem",color:"#06D6A0",marginBottom:12}}>Din analyse</p>
              {KT.filter(t=>kog[t.id]).map(t=>(
                <div key={t.id} style={{borderBottom:"1px solid #1a3a28",paddingBottom:10}}>
                  <span style={{fontSize:"0.72rem",textTransform:"uppercase",letterSpacing:"0.08em",color:t.farve,fontWeight:600}}>{t.ikon} {t.titel}</span>
                  <p style={{fontSize:"0.87rem",color:"#b0c0b8",lineHeight:1.55,marginTop:4}}>{kog[t.id]}</p>
                </div>
              ))}
              <div style={{display:"flex",gap:10,marginTop:8}}>
                <button style={{...S.primaryBtn,background:"#06D6A0",color:"#0a1f14",flex:2}} onClick={gemAnalyse}>📖 Gem i dagbog</button>
                <button style={{...S.primaryBtn,background:"#1a1a3a",color:"#5a5a8a",border:"1px solid #2a2a4a",flex:1,fontSize:"0.82rem"}}
                  onClick={()=>{setKog({});setAktTrin(null);}}>Ryd</button>
              </div>
            </div>
          )}
        </div>}

        {/* DAGBOG */}
        {view==="dagbog"&&<div style={S.col}>
          <div><p style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.4rem",color:"#f0f0ff",marginBottom:6}}>📖 Dagbog</p><p style={{fontSize:"0.84rem",color:"#6a6a9a",fontStyle:"italic"}}>Dine registreringer – gemt kun på denne enhed</p></div>
          <div style={{display:"flex",gap:8}}>
            {[{id:"alle",l:"Alle"},{id:"analyse",l:"Analyser"},{id:"tjek",l:"Følelsestjek"}].map(fl=>(
              <button key={fl.id} style={{flex:1,padding:"8px",borderRadius:8,border:"1px solid",cursor:"pointer",fontSize:"0.82rem",
                background:dagbogFilter===fl.id?"#9B5DE5":"transparent",
                borderColor:dagbogFilter===fl.id?"#9B5DE5":"#2a2a4a",
                color:dagbogFilter===fl.id?"#fff":"#6a6a9a"}}
                onClick={()=>setDagbogFilter(fl.id)}>{fl.l}</button>
            ))}
          </div>
          {filtreret.length===0&&(
            <div style={{textAlign:"center",padding:"40px 20px",color:"#4a4a6a"}}>
              <p style={{fontSize:"1.5rem",marginBottom:12}}>📖</p>
              <p style={{fontSize:"0.9rem"}}>Ingen registreringer endnu.</p>
              <p style={{fontSize:"0.78rem",marginTop:6}}>Lav et følelsestjek eller en kognitiv analyse – de gemmes automatisk her.</p>
            </div>
          )}
          {filtreret.map(post=>(
            <div key={post.id}>
              <button style={{...S.dagKort,borderLeft:post.type==="analyse"?"4px solid #06D6A0":"4px solid #4895EF"}}
                onClick={()=>setDagbogId(dagbogId===post.id?null:post.id)}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",width:"100%",gap:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                    <span style={{fontSize:"1.3rem"}}>{post.type==="analyse"?"⟳":post.emoji}</span>
                    <div style={{textAlign:"left"}}>
                      <p style={{fontSize:"0.9rem",fontWeight:500,color:"#e0e0f0",marginBottom:2}}>{post.type==="analyse"?"Kognitiv analyse":post.navn}</p>
                      <p style={{fontSize:"0.72rem",color:"#5a5a8a"}}>{post.dato}</p>
                    </div>
                  </div>
                  {post.type==="tjek"&&(
                    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                      <div style={{width:50,background:"#1a1a3a",borderRadius:4,height:4}}>
                        <div style={{width:`${post.intensitet*10}%`,height:"100%",background:post.farve,borderRadius:4}}/>
                      </div>
                      <span style={{fontSize:"0.72rem",color:"#5a5a8a"}}>{post.intensitet}/10</span>
                    </div>
                  )}
                  <span style={{color:"#3a3a5a",flexShrink:0}}>{dagbogId===post.id?"▲":"▼"}</span>
                </div>
              </button>
              {dagbogId===post.id&&(
                <div style={{...S.dagBody,borderLeft:post.type==="analyse"?"4px solid #06D6A0":"4px solid #4895EF"}} className="fade">
                  {post.type==="tjek"&&<>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                      <span style={{fontSize:"1.8rem"}}>{post.emoji}</span>
                      <div>
                        <p style={{fontSize:"1rem",fontWeight:600,color:post.farve}}>{post.navn}</p>
                        <p style={{fontSize:"0.78rem",color:"#5a5a8a"}}>Intensitet: {post.intensitet}/10</p>
                      </div>
                    </div>
                    {post.note&&<p style={{fontSize:"0.87rem",color:"#b0b0cc",lineHeight:1.6,fontStyle:"italic",borderLeft:"2px solid #4895EF",paddingLeft:10}}>"{post.note}"</p>}
                  </>}
                  {post.type==="analyse"&&(
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      {KT.filter(t=>post.indhold?.[t.id]).map(t=>(
                        <div key={t.id}>
                          <span style={{fontSize:"0.7rem",textTransform:"uppercase",letterSpacing:"0.08em",color:t.farve,fontWeight:600}}>{t.ikon} {t.titel}</span>
                          <p style={{fontSize:"0.87rem",color:"#b0c0b8",lineHeight:1.55,marginTop:4}}>{post.indhold[t.id]}</p>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          ))}
          {filtreret.length>0&&<p style={{fontSize:"0.72rem",color:"#3a3a5a",textAlign:"center"}}>{filtreret.length} registreringer · Gemt lokalt på denne enhed</p>}
        </div>}

        {/* STØTTE */}
        {view==="støtte"&&<div style={S.col}>
          <div><p style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.4rem",color:"#f0f0ff",marginBottom:6}}>Støtte & hjælp</p><p style={{fontSize:"0.84rem",color:"#6a6a9a",fontStyle:"italic"}}>Du behøver ikke klare det alene</p></div>
          <p style={S.lbl}>Mine støttepersoner – gemmes automatisk</p>
          {sup.map((s,i)=>(
            <div key={i} style={S.supKort}>
              <div style={{width:40,height:40,borderRadius:"50%",background:"#1e1e50",display:"flex",alignItems:"center",justifyContent:"center",color:"#9B5DE5",fontSize:"1rem",flexShrink:0,fontWeight:600}}>{s.navn?s.navn[0].toUpperCase():"?"}</div>
              <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
                <input style={S.inp} placeholder="Navn eller rolle" value={s.navn} onChange={e=>updSup(i,"navn",e.target.value)}/>
                <input style={S.inp} placeholder="Telefonnummer" value={s.tlf} onChange={e=>updSup(i,"tlf",e.target.value)}/>
              </div>
            </div>
          ))}
          <button style={S.addBtn} onClick={()=>setSup(p=>[...p,{navn:"",tlf:""}])}>+ Tilføj kontakt</button>
          <p style={S.lbl}>Professionelle hjælpelinjer</p>
          {[
            {navn:"StofTelefonen",tlf:"80 20 08 08",tid:"Alle dage",beskr:"Anonym rådgivning om stof og alkohol",farve:"#E63946"},
            {navn:"Livslinjen",tlf:"70 201 201",tid:"Døgnet rundt",beskr:"Når det er livstruende svært",farve:"#4895EF"},
            {navn:"SMS-rådgivning",tlf:"Sms 1899",tid:"11–24 alle dage",beskr:"Skriv hvis du ikke vil tale",farve:"#F4A261"},
          ].map(h=>(
            <div key={h.navn} style={{...S.hotKort,borderTop:`3px solid ${h.farve}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:"0.95rem",fontWeight:600,color:h.farve}}>{h.navn}</span>
                <span style={{fontSize:"0.72rem",color:"#5a5a8a"}}>{h.tid}</span>
              </div>
              <p style={{fontSize:"0.82rem",color:"#7070a0",fontStyle:"italic",marginBottom:12}}>{h.beskr}</p>
              <a href={`tel:${h.tlf.replace(/\s/g,"")}`} style={{...S.ringBtn,background:h.farve}}>Ring {h.tlf}</a>
            </div>
          ))}
          <div style={{background:"#1a0a0a",border:"1px solid #3a1a1a",borderRadius:12,padding:"16px",display:"flex",flexDirection:"column",gap:10}}>
            <p style={{fontSize:"0.85rem",color:"#aa6060",marginBottom:2}}>Akut hjælp</p>
            <a href="tel:1813" style={{...S.ringBtn,background:"#c1121f",fontSize:"0.95rem"}}>🏥 1813 – Lægevagt (ikke livstruende)</a>
            <a href="tel:112" style={{...S.ringBtn,background:"#E63946",fontSize:"0.95rem"}}>🚨 112 – Livstruende nødsituation</a>
          </div>
        </div>}

      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
