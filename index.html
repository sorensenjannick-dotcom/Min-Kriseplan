<style>

body{background:#0b0b1a;font-family:'DM Sans',sans-serif;}
button:focus,input:focus,textarea:focus{outline:none;}

input,textarea{font-family:'DM Sans',sans-serif;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:#1e1e40;border-radius:4px;}
@keyframes si{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes fd{from{opacity:0;}to{opacity:1;}}

.sin{animation:si .28s ease-out;}
.fade{animation:fd .2s ease-out;}

.dropdown{animation:dd .2s ease-out;}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;


// ── FAREDETEKTERING ──────────────────────────────────────────────────────────
const FAREORD = [
  "slå mig selv","skade mig selv","skære mig","brænde mig","kvæle mig",
  "slå mit hoved","gøre mig selv noget","straffe mig selv","har skadet mig",
  "har skåret mig","har slået mig","har brændt mig","slog mig selv",
  "tage mit liv","tage livet af mig","slut på mit liv","ende mit liv",
  "ikke vil leve","ikke vil leve mere","ikke orker at leve","træt af at leve",
  "vil ikke eksistere","ønsker at dø","vil dø","tænker på at dø",
  "har lyst til at dø","vil ikke vågne op","sover ikke op igen",
  "selvmord","begå selvmord","planlægger selvmord","har en plan om selvmord",
  "har nedskrevet en plan","har lavet en plan om","har besluttet mig for at dø",
  "kommer ikke til at være her","er ikke her i morgen","ses ikke mere",
  "farvel for altid","dette er mit sidste","siger farvel",
  "taget for mange piller","spist for mange piller","taget en overdosis",
  "har spist en masse piller","har taget en masse piller","har taget alle pillerne",
  "overdoseret","overdosis med vilje","forgiftet mig selv",
  "giver op på livet","end det hele","afslutte det hele","er forbi nu",
  "er færdig nu","ingen grund til at leve","intet at leve for","livet er ikke værd",
  "slå andre","skade andre","gøre andre noget","tage livet af en anden",
  "dræbe","slå ihjel","gøre fortræd","angribe nogen","vil gøre nogen ondt",
  "har gjort nogen ondt","skadet en anden",
];
function tjekFare(t) {
  if (!t) return false;
  const v = t.toLowerCase();
  return FAREORD.some(o => v.includes(o));
}

// ── DATA ─────────────────────────────────────────────────────────────────────
const GF = [
  { id:"vrede", navn:"Vrede", emoji:"🔴", farve:"#E63946", beskrivelse:"Frustreret · irriteret · rasende",
    nuancer:["Irriteret","Frustreret","Rasende","Skuffet","Hidsig","Bitter","Misundelig","Jaloux"],

    strategier:["Stop op – tæl til 10 inden du reagerer","Spørg: Hvad er jeg bange for bag vreden?","Skriv hvad du ikke tør sige højt","Bevæg kroppen – gå en tur eller løb"] },
  { id:"angst", navn:"Angst", emoji:"🟡", farve:"#F4A261", beskrivelse:"Urolig · bange · nervøs",

    tanker:["Noget dårligt vil ske","Jeg kan ikke klare det","Hvad nu hvis…","Det er farligt"],
    kognitivt:"Angst er kroppens alarmsystem. Den overdriver trusler og undervurderer dine ressourcer. Angsten lyver ofte om fremtiden.",
    strategier:["4-7-8 vejrtrækning: ind 4 sek, hold 7, ud 8","5-4-3-2-1 jordforbindelsesøvelse: 5 ting du kan SE, 4 du kan RØRE, 3 du kan HØRE, 2 du kan LUGTE, 1 du kan SMAGE","Spørg: Hvad er det værste der KAN ske – og hvad gør jeg så?","Skriv bekymringen ned – ud af hovedet"] },
  { id:"tristhed", navn:"Tristhed", emoji:"🔵", farve:"#4895EF", beskrivelse:"Ked af det · trist · ensom",
    nuancer:["Ked af det","Trist","Tom","Ensom","Håbløs","Tung","Savner noget","Nedtrykt"],
    tanker:["Ingen forstår mig","Det bliver aldrig bedre","Jeg er alene med det","Hvad er meningen?"],
    kognitivt:"Tristhed signalerer at noget vigtigt er sket – et tab, en skuffelse. Det er ikke svaghed. Tristhed har brug for at blive mærket, ikke dulmet.",
    strategier:["Tillad dig selv at føle det – sæt 10 minutter af","Ring til én du har tillid til","Skriv et brev til dig selv med omsorg","Gør én lille ting der plejer dig"] },
  { id:"glæde", navn:"Glæde", emoji:"🟢", farve:"#2DC653", beskrivelse:"Glad · lettet · taknemmelig",
    nuancer:["Glad","Lettet","Taknemlig","Håbefuld","Begejstret","Stolt","Kærlig","Rolig"],
    tanker:["Det går faktisk okay","Jeg klarede det","Jeg er taknemmelig for…","Der er noget godt her"],
    kognitivt:"Glæde er vigtig at lægge mærke til – særligt i recovery. Den minder dig om hvad der er værd at kæmpe for.",
    strategier:["Skriv 3 ting du er taknemmelig for i dag","Del glæden med en anden","Notér: Hvad gjorde at det gik godt?","Brug det som motivation fremad"] },
  { id:"skam", navn:"Skam", emoji:"🟣", farve:"#9B5DE5", beskrivelse:"Forkert · mindreværdig · skyldig",
    nuancer:["Skyldig","Skamfuld","Mindreværdig","Forkert","Utilstrækkelig","Ydmyget","Pinlig","Sårbar"],
    tanker:["Jeg er dårlig","Jeg fortjener ikke hjælp","Jeg er til besvær","Alle andre klarer det bedre"],
    kognitivt:"Skam handler om hvem man tror man ER – ikke hvad man har gjort. Skam er en af de stærkeste udløsere for tilbagefald.",
    strategier:["Skam trives i hemmelighed – del den med én du stoler på","Hvad ville du sige til en ven i samme situation?","Skelne skyld (adfærd) fra skam (person)","Skriv tre ting du har gjort godt, selvom det var svært"] },
  { id:"afsky", navn:"Afsky", emoji:"🟠", farve:"#FB8500", beskrivelse:"Væmmelse · ubehag · lede",
    nuancer:["Væmmelse","Ubehag","Lede","Afvisning","Kvalme","Foragt","Desillusioneret","Træt af det"],
    tanker:["Jeg kan ikke holde ud at mærke det her","Det er ulideligt","Jeg vil væk fra dette","Jeg er træt af det hele"],
    kognitivt:"Afsky kan være en reaktion på egne handlinger eller situationer. Bag afsky gemmer sig ofte smerte eller sorg.",
    strategier:["Navngiv hvad du faktisk reagerer på","Spørg: Hvad har denne følelse brug for?","Giv dig selv tilladelse til at sætte grænser","Søg frisk luft og fysisk bevægelse"] },
];

const K5 = [
  { id:"stop", nr:1, titel:"Stop op", farve:"#E63946", emoji:"✋", beskrivelse:"Genkend at du er i en krisesituation. Sig det højt for dig selv: 'Jeg har det svært lige nu.'", handling:"Tag 3 langsomme, dybe vejrtrækninger. Sæt dig ned hvis du kan. Giv dig selv lov til at stoppe." },
  { id:"pause", nr:2, titel:"Sæt på pause", farve:"#F4A261", emoji:"⏸️", beskrivelse:"Vent 15 minutter inden du handler. Trangen topper – og går over.", handling:"Gå en kort tur. Drik et glas koldt vand. Sæt musik på. Gør noget med hænderne." },
  { id:"kontakt", nr:3, titel:"Kontakt nogen", farve:"#4895EF", emoji:"📞", beskrivelse:"Du behøver ikke klare det alene. Ræk ud – selv en kort besked hjælper.", handling:"Ring eller skriv til én på din støtteliste. Du behøver ikke forklare alt." },
  { id:"strategi", nr:4, titel:"Brug en strategi", farve:"#9B5DE5", emoji:"🛡️", beskrivelse:"Hvad har hjulpet dig før? Brug det der virker for dig.", handling:"Skriv i dagbogen. Se en film. Lav noget mad. Brug en afslapningsteknik." },
  { id:"selvomsorg", nr:5, titel:"Selvomsorg", farve:"#2DC653", emoji:"💛", beskrivelse:"Du er ikke svag – du er i en svær situation. Anerkend at du søgte hjælp.", handling:"Hvad ville du sige til en ven i samme situation? Sig det til dig selv." },
];

const MENU_SEKTIONER = [
  {
    id:"om", titel:"Om appen", emoji:"ℹ️",
    afsnit:[
      {titel:"Hvad er Min Kriseplan?", tekst:"Min Kriseplan er en selvhjælpsapp baseret på kognitiv tilgang. Den er udviklet til mennesker med rusmiddelproblematik og kan bruges individuelt eller som supplement i professionel behandling."},
      {titel:"Vigtig ansvarsfraskrivelse", tekst:"Denne app erstatter ikke professionel behandling, psykologhjælp eller lægelig rådgivning. Faredetekteringen er et supplement og ikke en garanti. Søg altid professionel hjælp ved behov.\n\n© Jannick Sørensen 2026. Alle rettigheder forbeholdes.", farve:"#E63946"},
    ]
  },
  {
    id:"kognitiv", titel:"Kognitiv tilgang i dybden", emoji:"🧠",
    afsnit:[
      {titel:"Hvad er kognitiv tilgang?", tekst:"Kognitiv tilgang bygger på idéen om at tanker, følelser, kropslige reaktioner og adfærd hænger uløseligt sammen og påvirker hinanden i alle retninger. Når vi bliver opmærksomme på vores automatiske tanker, kan vi undersøge om de er sande – og vælge at reagere anderledes."},
      {titel:"Hvornår er kognitiv tilgang god?", tekst:"Kognitiv tilgang er særligt effektiv når du:\n\n• Ønsker at forstå dine egne mønstre og reaktioner\n• Vil arbejde med at identificere tidlige advarselssignaler\n• Har brug for konkrete redskaber til at håndtere trang og svære situationer\n• Arbejder med forandring over tid og ønsker at gøre det bevidst\n• Bruger appen som supplement til behandling hos en professionel"},
      {titel:"Hvornår bør du søge noget andet?", tekst:"Kognitiv tilgang og denne app er ikke tilstrækkelig hvis du:\n\n• Har akutte kriser eller tanker om at skade dig selv eller andre – ring 112 eller 1813\n• Oplever svære psykiatriske symptomer som psykoser, svær depression eller angst\n• Har brug for medicinsk afrusning eller behandling\n• Føler at du ikke kan klare det alene – søg professionel hjælp\n\nSøg altid din læge, behandler eller et behandlingscenter hvis du er i tvivl.", farve:"#E63946"},
      {titel:"Begrænsninger", tekst:"Selvhjælp er et supplement – ikke en erstatning. Kognitiv tilgang virker bedst i kombination med professionel støtte, sociale relationer og en tryg hverdag. Appen kan ikke tilbyde den menneskelige kontakt og faglige vurdering som en behandler kan."},
    ]
  },
  {
    id:"guide", titel:"Guide til appen", emoji:"📋",
    afsnit:[
      {titel:"🌊 Følelser", tekst:"Her finder du de 6 grundfølelser. Vælg den følelse der passer bedst, uddyb med en nuance og vurdér intensiteten. Du kan herefter gå direkte til den kognitive analyse med følelsen allerede udfyldt."},
      {titel:"⟳ Analyser", tekst:"Den kognitive analyse guider dig igennem 5 trin: Situation → Tanke → Følelse → Kropslig reaktion → Adfærd/Handling.\n\nEfter trin 5 spørges du om din adfærd var ønsket. Hvis ikke, åbnes trin 6 (udfordring af tanken) og trin 7 (ny handling). Til sidst kan du vælge at starte en ny runde. Analysen gemmes automatisk i dagbogen."},
      {titel:"🛡 Kriseplan", tekst:"Her bygger du din personlige kriseplan med:\n• Hvad er vigtigt for dig – din motivation\n• Mine advarselstegn – tidlige signaler\n• Min personlige aftale – en aftale med dig selv\n• Hvad hjælper faktisk – dine egne strategier\n• 5-trins kriseplan – hvad gør du når krisen rammer"},
      {titel:"📖 Dagbog", tekst:"Dagbogen samler automatisk alle dine følelsestjek og kognitive analyser. Du kan filtrere mellem dem og folde hver registrering ud for at se detaljerne. Alt er gemt lokalt på din enhed."},
      {titel:"◌ Følelsestjek", tekst:"Tilgås fra forsiden med 'Start tjek'. Du kan vælge én eller flere grundfølelser – hver følelse får sin egen intensitetsskyder (1-10).\n\nFølelser med intensitet over 2 overføres til analysen. Den eller de følelser med højst intensitet fremhæves, mens følelser med lavere intensitet vises dæmpet. Følelser med intensitet 1-2 gemmes i dagbogen men vises ikke i analysen.\n\nEfter at have gemt kan du vælge at gå direkte til den kognitive analyse med følelserne allerede udfyldt. Du kan også sætte daglige påmindelser med alarm-knappen 🔔."},
      {titel:"◈ Støtte", tekst:"Her finder du dine personlige støttepersoner (som du selv udfylder), og professionelle hjælpelinjer: Giftlinjen, Alkolinjen, Livslinjen, SMS-rådgivning, 1813 og 112."},
    ]
  },
];

function ls(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } }
function ss(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
function dato() { return new Date().toLocaleDateString("da-DK", { day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" }); }

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [accepteret, setAccepteret] = useState(() => ls("accepteret") || false);
  const [view, setView] = useState("home");
  const [menuÅben, setMenuÅben] = useState(false);
  const [menuSektion, setMenuSektion] = useState(null);
  const menuRef = useRef(null);

  // Persistent
  const [adv, setAdv] = useState(() => ls("adv") || ["","","",""]);
  const [vigtigt, setVigtigt] = useState(() => ls("vigtigt") || "");
  const [hvadHjælper, setHvadHjælper] = useState(() => ls("hvadHjælper") || "");
  const [aftale, setAftale] = useState(() => ls("aftale") || "");
  const [sup, setSup] = useState(() => ls("sup") || [{navn:"Min behandler",tlf:""},{navn:"Nær ven / familie",tlf:""}]);
  const [tjekHist, setTjekHist] = useState(() => ls("tjekHist") || []);
  const [analyseHist, setAnalyseHist] = useState(() => ls("analyseHist") || []);

  // Følelser
  const [valgtF, setValgtF] = useState(null);
  const [valgtN, setValgtN] = useState(null);
  const [int, setInt] = useState(5);

  // Analyse
  const [analyseFase, setAnalyseFase] = useState("trin");
  const [kog, setKog] = useState({situation:"",tanke:"",følelse:"",krop:"",adfærd:"",udfordring:"",handling:""});
  const [analyseRunde, setAnalyseRunde] = useState(1);
  const [aktivtTrin, setAktivtTrin] = useState(null);

  // Kriseplan
  const [aktKrise, setAktKrise] = useState(null);
  const [kriseStatus, setKriseStatus] = useState({});

  // Tjek
  const [tjekÅben, setTjekÅben] = useState(false);
  const [tjekF, setTjekF] = useState(null); // kun én følelse
  const [tjekInt, setTjekInt] = useState(5);
  const [tjekTrang, setTjekTrang] = useState(5);
  const [tjekNote, setTjekNote] = useState("");
  const [tjekGemt, setTjekGemt] = useState(false);

  const gemTjek = () => {
    const fv = GF.find(x => x.id === tjekF);
    setTjekHist(p => [{
      id:Date.now(), type:"tjek", dato:dato(),
      følelse:tjekF, emoji:fv?.emoji, navn:fv?.navn, farve:fv?.farve,
      intensitet:tjekInt, trang:tjekTrang, note:tjekNote
    }, ...p].slice(0,50));
    setTjekGemt(true);
  };

  const gåTilAnalyseFraFølelsestjek = () => {
    if (tjekF) {
      const fv = GF.find(x => x.id === tjekF);
      setKog(prev => ({...prev, følelse:`${fv.emoji} ${fv.navn} (${tjekInt}/10)`}));
    }
    setTjekÅben(false); setTjekGemt(false);
    setView("kognitiv");
  };

  // Dagbog
  const [dagbogId, setDagbogId] = useState(null);
  const [dagFilter, setDagFilter] = useState("alle");

  // Alarm
  const [visAlarm, setVisAlarm] = useState(false);
  const [alarmer, setAlarmer] = useState([{id:1,aktiv:false,tid:"08:00",sat:false},{id:2,aktiv:false,tid:"20:00",sat:false}]);

  // Fare
  const [fareÅben, setFareÅben] = useState(false);

  // Samtykke-tilbagetrækning bekræftelse
  const [visTilbageTræk, setVisTilbageTræk] = useState(false);

  useEffect(() => ss("accepteret", accepteret), [accepteret]);
  useEffect(() => ss("adv", adv), [adv]);
  useEffect(() => ss("vigtigt", vigtigt), [vigtigt]);
  useEffect(() => ss("hvadHjælper", hvadHjælper), [hvadHjælper]);
  useEffect(() => ss("aftale", aftale), [aftale]);
  useEffect(() => ss("sup", sup), [sup]);
  useEffect(() => ss("tjekHist", tjekHist), [tjekHist]);
  useEffect(() => ss("analyseHist", analyseHist), [analyseHist]);
  useEffect(() => { if (Object.values(kog).some(v => v)) ss("kogDraft", kog); }, [kog]);

  // Luk menu ved klik udenfor
  useEffect(() => {
    const handler = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuÅben(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const f = GF.find(x => x.id === valgtF);
  const aktAlarmer = alarmer.filter(a => a.aktiv).length;
  const allePoster = [...analyseHist, ...tjekHist].sort((a,b) => b.id - a.id);
  const filtreret = dagFilter === "alle" ? allePoster : allePoster.filter(p => p.type === dagFilter);
  const kriseDone = Object.values(kriseStatus).filter(Boolean).length;
  const harTrinIndhold = Object.values(kog).some(v => v && v.trim().length > 0);

  const updSup = (i, field, v) => setSup(p => { const c=[...p]; c[i]={...c[i],[field]:v}; return c; });
  const updAdv = (i, v) => setAdv(p => { const c=[...p]; c[i]=v; return c; });
  const togKrise = (id) => setKriseStatus(p => ({...p,[id]:!p[id]}));

  const updKog = (field, val) => {
    setKog(prev => {
      const next = {...prev, [field]: val};
      if ((field === "tanke" || field === "adfærd") && tjekFare(val)) setFareÅben(true);
      return next;
    });
  };

  const rydAnalyse = () => {
    setKog({situation:"",tanke:"",følelse:"",krop:"",adfærd:"",udfordring:"",handling:""});
    setAnalyseFase("trin"); setAnalyseRunde(1); setAktivtTrin(null);
    ss("kogDraft", null);
  };

  const gemAnalyse = () => {
    if (!Object.values(kog).some(v => v)) return;
    setAnalyseHist(p => [{id:Date.now(), type:"analyse", dato:dato(), runde:analyseRunde, indhold:{...kog}}, ...p].slice(0,50));
    rydAnalyse();
  };

  const startNyRunde = () => {
    const gammelHandling = kog.handling;
    setKog({situation:"",tanke:gammelHandling,følelse:"",krop:"",adfærd:"",udfordring:"",handling:""});
    setAnalyseFase("trin"); setAnalyseRunde(r => r+1); setAktivtTrin(null);
  };

  const gåTilAnalyse = () => {
    if (valgtF) {
      const fv = GF.find(x => x.id === valgtF);
      const tekst = valgtN ? `${fv.navn} – ${valgtN} (intensitet: ${int}/10)` : `${fv.navn} (intensitet: ${int}/10)`;
      setKog(prev => ({...prev, følelse: tekst}));
    }
    setView("kognitiv");
  };

  const åbnTjek = () => { setTjekF(null); setTjekInt(5); setTjekTrang(5); setTjekNote(""); setTjekGemt(false); setTjekÅben(true); };

  // Følelse-vælger i analyse
  const [vælgerÅben, setVælgerÅben] = useState(false);
  const [vælgerFølelser, setVælgerFølelser] = useState({});
  const [vælgerRækkefølge, setVælgerRækkefølge] = useState([]);
  const [vælgerÅbenNuance, setVælgerÅbenNuance] = useState(null);

  const togVælger = (id) => {
    setVælgerFølelser(prev => {
      const kopi = Object.assign({}, prev);
      if (kopi[id] !== undefined) {
        delete kopi[id];
        setVælgerRækkefølge(r => r.filter(x => x !== id));
      } else {
        kopi[id] = {intensitet:5, nuance:null};
        setVælgerRækkefølge(r => [...r, id]);
      }
      return kopi;
    });
  };
  const updVælgerInt = (id, val) => setVælgerFølelser(prev => ({
    ...prev, [id]: {...prev[id], intensitet:val}
  }));
  const updVælgerNuance = (id, nuance) => setVælgerFølelser(prev => ({
    ...prev, [id]: {...prev[id], nuance}
  }));

              </div>
              <div style={s.planBody}>
                <p style={s.planHjælp}>{sek.hjælp}</p>

                  <p style={{fontSize:"0.7rem",color:sek.tc,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Det du har skrevet</p>

            <div style={{...s.planBody,gap:8}}>

            </div>
          </div>

              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                <span style={{fontSize:"2.2rem"}}>{f.emoji}</span>
                <span style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.6rem",color:f.farve}}>{f.navn}</span>

            <p style={s.lbl}>Typiske automatiske tanker</p>
            <div style={{background:"#12122a",border:"1px solid #1e1e40",borderRadius:12,padding:"14px 16px",display:"flex",flexDirection:"column",gap:9}}>

                <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",fontSize:"0.87rem"}}>
                  <span style={{color:f.farve,fontSize:"1.1rem"}}>「</span>
                  <span style={{color:"#b0b0cc",fontStyle:"italic",lineHeight:1.5}}>{t}</span>
                  <span style={{color:f.farve,fontSize:"1.1rem"}}>」</span>

                </div>
              ))}
            </div>
            <button style={{border:"none",borderRadius:12,padding:"13px 20px",color:"#fff",fontSize:"0.92rem",cursor:"pointer",width:"100%",background:f.farve}} onClick={gåTilAnalyse}>
              Analyser tanken bag følelsen →
            </button>
          </div>}
        </div>}

          <div>
            <p style={s.pageTitle}>Kognitiv analyse{analyseRunde>1?` – runde ${analyseRunde}`:""}</p>

          </div>
          <div style={s.infoBox}>
            <p style={{fontSize:"0.87rem",color:"#8888aa",lineHeight:1.7}}>Tanker er ikke fakta. Start med at beskrive situationen og dine reaktioner – analysen gemmes automatisk undervejs og i dagbogen til sidst.</p>
          </div>

          {analyseFase==="trin" && [
            {felt:"situation",titel:"Situation",ikon:"①",farve:"#4895EF",spørgsmål:"Hvad skete der konkret?",hjælp:"Beskriv kun fakta – ikke tolkninger. Hvad ville et kamera optage?",sammenhæng:"Situationen i sig selv er neutral – det er vores tanker om den, der sætter resten i gang.",placeholder:"Fx: Jeg var alene hjemme og modtog en besked fra en gammel ven der bruger…"},
            {felt:"tanke",titel:"Automatisk tanke",ikon:"②",farve:"#F4A261",spørgsmål:"Hvad tænkte du i det øjeblik?",hjælp:"Automatiske tanker er hurtige og ubevidste. De opstår inden vi når at reflektere.",sammenhæng:"Tanken udløser følelsen. Samme situation kan give vidt forskellige følelser – alt efter hvilken tanke der opstår.",placeholder:"Fx: 'Det er kun én gang', 'Jeg fortjener lidt ro'…"},
            {felt:"følelse",titel:"Følelse",ikon:"③",farve:"#9B5DE5",spørgsmål:"Hvilken følelse kom med tanken?",hjælp:"Tryk på 'Vælg følelser' for at vælge direkte, eller skriv selv. Brug de 6 grundfølelser som guide.",sammenhæng:"Følelsen forstærker tanken og sætter kroppen i beredskab. Følelse og krop påvirker hinanden gensidigt.",placeholder:"Fx: Angst (8/10), Skam (6/10)…", erFølelse:true},
            {felt:"krop",titel:"Kropslig reaktion",ikon:"④",farve:"#C77DFF",spørgsmål:"Hvad mærkede du i kroppen?",hjælp:"Kroppen reagerer på følelser. Læg mærke til fysiske signaler – de er vigtige information.",sammenhæng:"Kropslige signaler kan selv udløse nye tanker og følelser – fx kan hjertebanken føre til tanken 'noget er galt'.",placeholder:"Fx: Klump i halsen, uro i brystet, hjertebanken…"},
            {felt:"adfærd",titel:"Adfærd / Handling",ikon:"⑤",farve:"#E63946",spørgsmål:"Hvad havde du lyst til at gøre – eller hvad gjorde du?",hjælp:"Adfærd og handlinger følger tanker, følelser og kropslige reaktioner – og påvirker dem igen.",sammenhæng:"Adfærden afslutter ikke altid cirklen – nogle gange handler vi først, og bagefter opstår tankerne og følelserne.",placeholder:"Fx: Ville isolere mig, tænkte på at bruge…"},
          ].map((trin,idx,arr) => (
            <div key={trin.felt}>
              <button style={{...s.trinHdr,borderLeft:`4px solid ${trin.farve}`,background:aktivtTrin===trin.felt?"#141430":"#11112a"}}
                onClick={() => setAktivtTrin(aktivtTrin===trin.felt?null:trin.felt)}>
                <div style={{display:"flex",alignItems:"flex-start",gap:12,flex:1,textAlign:"left"}}>
                  <span style={{color:trin.farve,fontSize:"1.2rem",fontWeight:700,lineHeight:1.3,flexShrink:0}}>{trin.ikon}</span>
                  <div>
                    <p style={{fontSize:"0.95rem",fontWeight:500,color:"#e0e0f0",marginBottom:2}}>{trin.titel}</p>
                    <p style={{fontSize:"0.77rem",color:"#6a6a9a",fontStyle:"italic"}}>{trin.spørgsmål}</p>
                  </div>
                </div>
                <span style={{color:kog[trin.felt]?"#2DC653":"#3a3a5a",fontSize:"1rem",flexShrink:0}}>{kog[trin.felt]?"✓":(aktivtTrin===trin.felt?"▲":"▼")}</span>
              </button>
              {aktivtTrin===trin.felt && (
                <div style={{background:"#0e0e25",borderLeft:`4px solid ${trin.farve}`,borderRadius:"0 0 10px 10px",padding:"16px",display:"flex",flexDirection:"column",gap:12,marginTop:-2}}>
                  <p style={{fontSize:"0.82rem",color:"#6a6a9a",lineHeight:1.6,fontStyle:"italic"}}>{trin.hjælp}</p>
                  {trin.erFølelse && (
                    <button style={{background:"#9B5DE5",border:"none",borderRadius:8,padding:"10px 14px",color:"#fff",fontSize:"0.85rem",cursor:"pointer",width:"100%",fontWeight:500}}
                      onClick={() => { setVælgerFølelser({}); setVælgerRækkefølge([]); setVælgerÅben(true); }}>
                      🌊 Vælg følelser direkte
                    </button>
                  )}
                  <div style={{border:"1px solid",borderRadius:8,padding:"10px 12px",display:"flex",flexDirection:"column",gap:4,borderColor:trin.farve+"40",background:trin.farve+"0d"}}>
                    <span style={{fontSize:"0.68rem",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:600,color:trin.farve}}>↻ Sammenhæng</span>
                    <p style={{fontSize:"0.83rem",color:"#b0b0cc",lineHeight:1.6}}>{trin.sammenhæng}</p>
                  </div>
                  <textarea style={{background:"#12122a",border:`1px solid ${trin.farve}50`,borderRadius:8,padding:"12px",color:"#dcdcee",fontSize:"0.87rem",resize:"vertical",width:"100%",lineHeight:1.6}} rows={3}
                    placeholder={trin.placeholder} value={kog[trin.felt]||""} onChange={e => updKog(trin.felt,e.target.value)}/>
                  {idx<arr.length-1 ? (
                    <button style={{background:"none",border:`1px solid ${trin.farve}`,borderRadius:8,padding:"8px 16px",fontSize:"0.81rem",cursor:"pointer",alignSelf:"flex-end",color:trin.farve}}
                      onClick={() => setAktivtTrin(arr[idx+1].felt)}>Næste trin →</button>
                  ) : (
                    <button style={{background:trin.farve,border:"none",borderRadius:8,padding:"10px 16px",fontSize:"0.85rem",cursor:"pointer",color:"#fff",width:"100%",marginTop:4}}
                      onClick={() => {setAktivtTrin(null);setAnalyseFase("adfærdSpørgsmål");}}>Fortsæt →</button>
                  )}
                </div>
              )}
            </div>
          ))}

          {analyseFase==="adfærdSpørgsmål" && (
            <div style={{background:"#12122a",border:"1px solid #2a2a4a",borderRadius:14,padding:"20px",display:"flex",flexDirection:"column",gap:14}} className="fade">
              <p style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.1rem",color:"#f0f0ff"}}>Er den adfærd du beskrev den ønskede?</p>
              {kog.adfærd && <p style={{fontSize:"0.85rem",color:"#7070a0",fontStyle:"italic",borderLeft:"2px solid #E63946",paddingLeft:10,lineHeight:1.55}}>"{kog.adfærd}"</p>}
              <p style={{fontSize:"0.84rem",color:"#8888aa",lineHeight:1.65}}>Var det den reaktion du gerne ville have haft – eller ønskede du en anden adfærd?</p>
              <div style={{display:"flex",gap:10}}>
                <button style={{flex:1,border:"none",borderRadius:10,padding:"13px",color:"#fff",fontSize:"0.92rem",cursor:"pointer",background:"#2DC653"}} onClick={gemAnalyse}>✓ Ja – gem analysen</button>
                <button style={{flex:1,border:"none",borderRadius:10,padding:"13px",color:"#fff",fontSize:"0.92rem",cursor:"pointer",background:"#9B5DE5"}} onClick={() => setAnalyseFase("udfordring")}>Nej – udfordr tanken</button>
              </div>
            </div>
          )}

          {analyseFase==="udfordring" && (
            <div style={{background:"#12122a",border:"1px solid #2DC65340",borderRadius:14,padding:"18px",display:"flex",flexDirection:"column",gap:12}} className="fade">
              <p style={{fontSize:"0.7rem",color:"#2DC653",textTransform:"uppercase",letterSpacing:"0.1em"}}>⑥ Udfordring af tanken</p>
              <p style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.1rem",color:"#f0f0ff"}}>Hvad er en mere balanceret tanke?</p>
              <p style={{fontSize:"0.85rem",color:"#8888aa",lineHeight:1.65}}>Automatiske tanker er ikke altid sande – de er hypoteser der kan undersøges. Find beviser <strong style={{color:"#2DC653"}}>FOR</strong> og <strong style={{color:"#E63946"}}>IMOD</strong> tanken.</p>
              {kog.tanke && (
                <div style={{background:"#0f0f26",borderRadius:8,padding:"10px 12px",borderLeft:"3px solid #F4A261"}}>
                  <p style={{fontSize:"0.7rem",color:"#F4A261",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Din automatiske tanke</p>
                  <p style={{fontSize:"0.87rem",color:"#c0b080",fontStyle:"italic"}}>"{kog.tanke}"</p>
                </div>
              )}
              <textarea style={{background:"#0d0d22",border:"1px solid #2DC65350",borderRadius:8,padding:"12px",color:"#dcdcee",fontSize:"0.87rem",resize:"vertical",width:"100%",lineHeight:1.6}} rows={4}
                placeholder="Fx: 'En mere realistisk tanke er at jeg har klaret svære situationer før, og at jeg kan søge hjælp…'"
                value={kog.udfordring||""} onChange={e => updKog("udfordring",e.target.value)}/>
              {kog.udfordring && (
                <button style={{background:"#2DC653",border:"none",borderRadius:8,padding:"10px 16px",fontSize:"0.85rem",cursor:"pointer",color:"#0a1f14",width:"100%"}}
                  onClick={() => setAnalyseFase("handling")}>Videre til ny handling →</button>
              )}
            </div>
          )}

          {analyseFase==="handling" && (
            <div style={{background:"#12122a",border:"1px solid #06D6A040",borderRadius:14,padding:"18px",display:"flex",flexDirection:"column",gap:12}} className="fade">
              <p style={{fontSize:"0.7rem",color:"#06D6A0",textTransform:"uppercase",letterSpacing:"0.1em"}}>⑦ Ny handling</p>
              <p style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.1rem",color:"#f0f0ff"}}>Hvad er et alternativt valg du kan træffe nu?</p>
              <p style={{fontSize:"0.85rem",color:"#8888aa",lineHeight:1.65}}>Baseret på din nye tanke – hvad er ét lille konkret skridt du KAN tage?</p>
              {kog.udfordring && (
                <div style={{background:"#0d1f18",borderRadius:8,padding:"10px 12px",borderLeft:"3px solid #2DC653"}}>
                  <p style={{fontSize:"0.7rem",color:"#2DC653",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Din nye tanke</p>
                  <p style={{fontSize:"0.87rem",color:"#90d8b8",fontStyle:"italic"}}>"{kog.udfordring}"</p>
                </div>
              )}
              <textarea style={{background:"#0d0d22",border:"1px solid #06D6A050",borderRadius:8,padding:"12px",color:"#dcdcee",fontSize:"0.87rem",resize:"vertical",width:"100%",lineHeight:1.6}} rows={3}
                placeholder="Fx: Ring til min behandler, gå en tur, skriv i dagbogen…"
                value={kog.handling||""} onChange={e => updKog("handling",e.target.value)}/>
              {kog.handling && (
                <button style={{background:"#06D6A0",border:"none",borderRadius:8,padding:"10px 16px",fontSize:"0.85rem",cursor:"pointer",color:"#0a1f14",width:"100%"}}
                  onClick={() => setAnalyseFase("nyAnalyseSpørgsmål")}>Afslut trin →</button>
              )}
            </div>
          )}

          {analyseFase==="nyAnalyseSpørgsmål" && (
            <div style={{background:"#12122a",border:"1px solid #2a2a4a",borderRadius:14,padding:"20px",display:"flex",flexDirection:"column",gap:14}} className="fade">
              <p style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.1rem",color:"#f0f0ff"}}>Har du lyst til at lave en ny analyse?</p>
              {kog.handling && <p style={{fontSize:"0.85rem",color:"#7070a0",fontStyle:"italic",borderLeft:"2px solid #06D6A0",paddingLeft:10,lineHeight:1.55}}>"{kog.handling}"</p>}
              <p style={{fontSize:"0.84rem",color:"#8888aa",lineHeight:1.65}}>Har du lyst til at lave en ny analyse på baggrund af din nye ønskede tanke eller handling? Den nye analyse starter med din handling som udgangspunkt.</p>
              <div style={{display:"flex",gap:10}}>
                <button style={{flex:1,border:"none",borderRadius:10,padding:"13px",color:"#fff",fontSize:"0.92rem",cursor:"pointer",background:"#2DC653"}}
                  onClick={() => {gemAnalyse();startNyRunde();}}>Ja – ny analyse</button>
                <button style={{flex:1,border:"none",borderRadius:10,padding:"13px",color:"#fff",fontSize:"0.92rem",cursor:"pointer",background:"#4895EF"}}
                  onClick={gemAnalyse}>Nej – gem og afslut</button>
              </div>
            </div>
          )}

          {harTrinIndhold && (
            <button style={{background:"none",border:"none",color:"#4a4a6a",fontSize:"0.75rem",cursor:"pointer",textDecoration:"underline",alignSelf:"flex-end"}} onClick={rydAnalyse}>Ryd analyse</button>
          )}
        </div>}

        {/* ══ DAGBOG ══ */}
        {view==="dagbog" && <div style={s.col}>
          <div><p style={s.pageTitle}>📖 Dagbog</p><p style={s.pageSub}>Dine registreringer – gemt kun på denne enhed</p></div>
          <div style={{display:"flex",gap:8}}>
            {[{id:"alle",l:"Alle"},{id:"analyse",l:"Analyser"},{id:"tjek",l:"Følelsestjek"}].map(fl => (
              <button key={fl.id} style={{flex:1,padding:"8px",borderRadius:8,border:"1px solid",cursor:"pointer",fontSize:"0.82rem",
                background:dagFilter===fl.id?"#9B5DE5":"transparent",borderColor:dagFilter===fl.id?"#9B5DE5":"#2a2a4a",color:dagFilter===fl.id?"#fff":"#6a6a9a"}}
                onClick={() => setDagFilter(fl.id)}>{fl.l}</button>
            ))}
          </div>
          {filtreret.length===0 && (
            <div style={{textAlign:"center",padding:"40px 20px",color:"#4a4a6a"}}>
              <p style={{fontSize:"1.5rem",marginBottom:12}}>📖</p>
              <p style={{fontSize:"0.9rem"}}>Ingen registreringer endnu.</p>
              <p style={{fontSize:"0.78rem",marginTop:6}}>Lav et følelsestjek eller en kognitiv analyse – de gemmes automatisk her.</p>
            </div>
          )}
          {filtreret.map(post => (
            <div key={post.id}>
              <button style={{width:"100%",background:"#12122a",border:"1px solid #1e1e40",borderLeft:post.type==="analyse"?"4px solid #06D6A0":"4px solid #4895EF",borderRadius:10,padding:"14px 16px",display:"flex",alignItems:"center",cursor:"pointer",color:"#dcdcee",textAlign:"left"}}
                onClick={() => setDagbogId(dagbogId===post.id?null:post.id)}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",width:"100%",gap:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                    <span style={{fontSize:"1.3rem"}}>{post.type==="analyse"?"⟳":post.emoji}</span>
                    <div style={{textAlign:"left"}}>
                      <p style={{fontSize:"0.9rem",fontWeight:500,color:"#e0e0f0",marginBottom:2}}>{post.type==="analyse"?`Kognitiv analyse${post.runde>1?" – runde "+post.runde:""}`:post.navn}</p>
                      <p style={{fontSize:"0.72rem",color:"#5a5a8a"}}>{post.dato}</p>
                    </div>
                  </div>
                  {post.type==="tjek" && (
                    <div style={{display:"flex",flexDirection:"column",gap:3,flexShrink:0,alignItems:"flex-end"}}>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <span style={{fontSize:"0.62rem",color:"#5a5a8a"}}>Følelse</span>
                        <div style={{width:36,background:"#1a1a3a",borderRadius:3,height:3}}><div style={{width:`${post.intensitet*10}%`,height:"100%",background:post.farve,borderRadius:3}}/></div>
                        <span style={{fontSize:"0.65rem",color:"#5a5a8a"}}>{post.intensitet}/10</span>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <span style={{fontSize:"0.62rem",color:"#5a5a8a"}}>Trang</span>
                        <div style={{width:36,background:"#1a1a3a",borderRadius:3,height:3}}><div style={{width:`${(post.trang||0)*10}%`,height:"100%",background:"#E63946",borderRadius:3}}/></div>
                        <span style={{fontSize:"0.65rem",color:"#5a5a8a"}}>{post.trang||0}/10</span>
                      </div>
                    </div>
                  )}
                  <span style={{color:"#3a3a5a",flexShrink:0}}>{dagbogId===post.id?"▲":"▼"}</span>
                </div>
              </button>
              {dagbogId===post.id && (
                <div style={{background:"#0e0e25",borderLeft:post.type==="analyse"?"4px solid #06D6A0":"4px solid #4895EF",borderRadius:"0 0 10px 10px",padding:"16px",marginTop:-2,display:"flex",flexDirection:"column",gap:10}} className="fade">
                  {post.type==="tjek" && <>
                    {post.følelser ? (
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {post.følelser.sort((a,b)=>b.intensitet-a.intensitet).map((f,i) => {
                          const erHøjest = f.intensitet === post.følelser[0].intensitet;
                          return (
                            <div key={f.id} style={{display:"flex",alignItems:"center",gap:10,opacity:erHøjest?1:0.6}}>
                              <span style={{fontSize:"1.4rem"}}>{f.emoji}</span>
                              <div style={{flex:1}}>
                                <div style={{display:"flex",justifyContent:"space-between"}}>
                                  <span style={{fontSize:"0.87rem",color:f.farve,fontWeight:erHøjest?600:400}}>{f.navn}</span>
                                  <span style={{fontSize:"0.78rem",color:"#5a5a8a"}}>{f.intensitet}/10</span>
                                </div>
                                <div style={{background:"#1a1a3a",borderRadius:4,height:3,marginTop:4}}>
                                  <div style={{width:`${f.intensitet*10}%`,height:"100%",background:f.farve,borderRadius:4}}/>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                        <p style={{fontSize:"0.78rem",color:"#5a5a8a"}}>Trang: {post.trang||0}/10</p>
                      </div>
                    ) : (
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:"1.8rem"}}>{post.emoji}</span>
                        <div>
                          <p style={{fontSize:"1rem",fontWeight:600,color:post.farve}}>{post.navn}</p>
                          <p style={{fontSize:"0.78rem",color:"#5a5a8a"}}>Følelse: {post.intensitet}/10 · Trang: {post.trang||0}/10</p>
                        </div>
                      </div>
                    )}
                    {post.note && <p style={{fontSize:"0.87rem",color:"#b0b0cc",lineHeight:1.6,fontStyle:"italic",borderLeft:"2px solid #4895EF",paddingLeft:10}}>"{post.note}"</p>}
                  </>}
                  {post.type==="analyse" && (
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      {[
                        {felt:"situation",titel:"① Situation",farve:"#4895EF"},
                        {felt:"tanke",titel:"② Automatisk tanke",farve:"#F4A261"},
                        {felt:"følelse",titel:"③ Følelse",farve:"#9B5DE5"},
                        {felt:"krop",titel:"④ Kropslig reaktion",farve:"#C77DFF"},
                        {felt:"adfærd",titel:"⑤ Adfærd / Handling",farve:"#E63946"},
                        {felt:"udfordring",titel:"⑥ Udfordring af tanken",farve:"#2DC653"},
                        {felt:"handling",titel:"⑦ Ny handling",farve:"#06D6A0"},
                      ].filter(t => post.indhold?.[t.felt]).map(t => (
                        <div key={t.felt}>
                          <span style={{fontSize:"0.7rem",textTransform:"uppercase",letterSpacing:"0.08em",color:t.farve,fontWeight:600}}>{t.titel}</span>
                          <p style={{fontSize:"0.87rem",color:"#b0c0b8",lineHeight:1.55,marginTop:4}}>{post.indhold[t.felt]}</p>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          ))}
          {filtreret.length>0 && <p style={{fontSize:"0.72rem",color:"#3a3a5a",textAlign:"center"}}>{filtreret.length} registreringer · Gemt lokalt på denne enhed</p>}
        </div>}

        {/* ══ STØTTE ══ */}
        {view==="støtte" && <div style={s.col}>
          <div><p style={s.pageTitle}>Støtte & hjælp</p><p style={s.pageSub}>Du behøver ikke klare det alene</p></div>
          <p style={s.lbl}>Mine støttepersoner – gemmes automatisk</p>
          {sup.map((sp,i) => (
            <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",background:"#12122a",borderRadius:12,padding:"12px"}}>
              <div style={{width:40,height:40,borderRadius:"50%",background:"#1e1e50",display:"flex",alignItems:"center",justifyContent:"center",color:"#9B5DE5",fontSize:"1rem",flexShrink:0,fontWeight:600}}>{sp.navn?sp.navn[0].toUpperCase():"?"}</div>
              <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
                <input style={s.inp} placeholder="Navn eller rolle" value={sp.navn} onChange={e => updSup(i,"navn",e.target.value)}/>
                <input style={s.inp} placeholder="Telefonnummer" value={sp.tlf} onChange={e => updSup(i,"tlf",e.target.value)}/>
              </div>
            </div>
          ))}
          <button style={s.addBtn} onClick={() => setSup(p => [...p,{navn:"",tlf:""}])}>+ Tilføj kontakt</button>
          <p style={s.lbl}>Professionelle hjælpelinjer</p>
          {[
            {navn:"Giftlinjen – overdosis/forgiftning",tlf:"82 12 12 12",tid:"Døgnet rundt",beskr:"Akut rådgivning ved forgiftning, overdosis og rusmidler",farve:"#E63946"},
            {navn:"Alkolinjen – alkohol",tlf:"80 200 500",tid:"Man 9-17, tir-fre 11-17",beskr:"Anonym rådgivning om alkoholproblemer",farve:"#F4A261"},
            {navn:"Livslinjen",tlf:"70 201 201",tid:"Døgnet rundt",beskr:"Når det er livstruende svært",farve:"#4895EF"},
            {navn:"SMS-rådgivning",tlf:"Sms 1899",tid:"11–24 alle dage",beskr:"Skriv hvis du ikke vil tale",farve:"#9B5DE5"},
          ].map(h => (
            <div key={h.navn} style={{background:"#12122a",borderRadius:12,padding:"16px",border:"1px solid #1e1e40",borderTop:`3px solid ${h.farve}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:"0.95rem",fontWeight:600,color:h.farve}}>{h.navn}</span>
                <span style={{fontSize:"0.72rem",color:"#5a5a8a"}}>{h.tid}</span>
              </div>
              <p style={{fontSize:"0.82rem",color:"#7070a0",fontStyle:"italic",marginBottom:12}}>{h.beskr}</p>
              <a href={`tel:${h.tlf.replace(/\s/g,"")}`} style={{display:"block",textAlign:"center",padding:"10px",borderRadius:8,color:"#fff",textDecoration:"none",fontSize:"0.92rem",fontWeight:500,background:h.farve}}>Ring {h.tlf}</a>
            </div>
          ))}
          <div style={{background:"#1a0a0a",border:"1px solid #3a1a1a",borderRadius:12,padding:"16px",display:"flex",flexDirection:"column",gap:10}}>
            <p style={{fontSize:"0.85rem",color:"#aa6060",marginBottom:2}}>Akut hjælp</p>
            <a href="tel:1813" style={{display:"block",textAlign:"center",padding:"10px",borderRadius:8,color:"#fff",textDecoration:"none",fontSize:"0.95rem",fontWeight:500,background:"#c1121f"}}>🏥 1813 – Lægevagt (ikke livstruende)</a>
            <a href="tel:112" style={{display:"block",textAlign:"center",padding:"10px",borderRadius:8,color:"#fff",textDecoration:"none",fontSize:"0.95rem",fontWeight:500,background:"#E63946"}}>🚨 112 – Livstruende nødsituation</a>
          </div>
        </div>}

      </main>

      <div style={{textAlign:"center",padding:"20px 16px 8px",fontSize:"0.7rem",color:"#3a3a5a",borderTop:"1px solid #12122a",marginTop:8}}>
        © Jannick Sørensen 2026 · Alle rettigheder forbeholdes
      </div>
    </div>
  );
